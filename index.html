<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Blast</title>
    <style>
        body { background: #050505; color: #fff; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; touch-action: none; margin: 0; padding-top: 10px; }
        #skor { font-size: 2.5rem; margin-bottom: 10px; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        #board { display: grid; grid-template-columns: repeat(8, 38px); grid-template-rows: repeat(8, 38px); gap: 2px; background: #1a1a1a; padding: 5px; border-radius: 8px; border: 2px solid #333; }
        .cell { width: 38px; height: 38px; background: #222; border-radius: 4px; }
        .filled { background: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
        #shelf { display: flex; justify-content: center; gap: 20px; margin-top: 30px; width: 100%; }
        .mini-piece { display: grid; padding: 10px; cursor: pointer; border: 2px solid #444; border-radius: 8px; }
        .m-cell { width: 15px; height: 15px; background: #ff00ff; border-radius: 2px; }
        .selected { border-color: #00f2ff; background: #2a2a2a; }
    </style>
</head>
<body>

    <div id="skor">0</div>
    <div id="board"></div>
    <div id="shelf">
        <div class="mini-piece" id="p1" onclick="selectPiece('p1')"></div>
        <div class="mini-piece" id="p2" onclick="selectPiece('p2')"></div>
        <div class="mini-piece" id="p3" onclick="selectPiece('p3')"></div>
    </div>

<script>
    let score = 0;
    let selectedShape = null;
    let selectedEl = null;
    const board = document.getElementById('board');
    const cells = [];
    
    // Şekiller: [Koordinatlar, Grid Genişliği]
    const shapes = [
        [[0,1,8,9], 2], [[0,8,16,17], 2], [[0,8,16,24], 1], [[0,1,2], 3], [[0], 1]
    ];

    for(let i=0; i<64; i++) {
        const c = document.createElement('div');
        c.className = 'cell';
        c.onclick = () => tryPlace(i);
        board.appendChild(c);
        cells.push(c);
    }

    function createPiece(id) {
        const el = document.getElementById(id);
        const rand = shapes[Math.floor(Math.random() * shapes.length)];
        el.dataset.shape = JSON.stringify(rand[0]);
        el.innerHTML = '';
        rand[0].forEach(() => {
            const m = document.createElement('div');
            m.className = 'm-cell';
            el.appendChild(m);
        });
        el.style.gridTemplateColumns = `repeat(${rand[1]}, 15px)`;
    }

    function selectPiece(id) {
        document.querySelectorAll('.mini-piece').forEach(p => p.classList.remove('selected'));
        selectedShape = JSON.parse(document.getElementById(id).dataset.shape);
        selectedEl = id;
        document.getElementById(id).classList.add('selected');
    }

    function tryPlace(index) {
        if(!selectedShape) return;
        
        // Yerleştirme uygun mu kontrol et
        const canPlace = selectedShape.every(s => cells[index + s] && !cells[index + s].classList.contains('filled'));
        
        if(canPlace) {
            selectedShape.forEach(s => cells[index + s].classList.add('filled'));
            score += 5;
            document.getElementById('skor').innerText = score;
            createPiece(selectedEl);
            selectedShape = null;
            document.getElementById(selectedEl).classList.remove('selected');
            checkLines();
        }
    }

    function checkLines() {
        for(let r=0; r<8; r++) {
            let row = cells.slice(r*8, r*8+8);
            if(row.every(c => c.classList.contains('filled'))) {
                row.forEach(c => c.classList.remove('filled'));
                score += 500;
                document.getElementById('skor').innerText = score;
            }
        }
    }

    createPiece('p1'); createPiece('p2'); createPiece('p3');
</script>
</body>
</html>
